        /* confetti always animates + idle offscreen so nothing sticks at the top */

        @keyframes fall { 0%{transform:translateY(0) rotate(0) scale(var(--s,1)); opacity:1} 90%{opacity:1} 100%{transform:translateY(128vh) rotate(720deg) scale(var(--s,1)); opacity:0} }
