<script>
/* Persistent local storage shim — data lives in this browser/app, offline, forever */
(function () {
  var LS = window.localStorage;
  window.storage = {
    get: function (k) { return Promise.resolve((function () { var v = LS.getItem(k); return v == null ? null : { key: k, value: v }; })()); },
    set: function (k, v) { LS.setItem(k, v); return Promise.resolve({ key: k, value: v }); },
    delete: function (k) { LS.removeItem(k); return Promise.resolve({ key: k, deleted: true }); },
    list: function (prefix) { var keys = []; for (var i = 0; i < LS.length; i++) { var key = LS.key(i); if (!prefix || key.indexOf(prefix) === 0) keys.push(key); } return Promise.resolve({ keys: keys }); }
  };
})();
